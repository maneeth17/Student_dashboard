spring.datasource.url=jdbc:h2:mem:studentdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:local-dev-jwt-secret-key-change-this-32+chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
server.port=${PORT:8081}

# Local permissive CORS for frontend dev servers.
APP_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
